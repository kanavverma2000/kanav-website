name: Fetch Live NEM Prices

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch: {}     # Manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch NEM prices
        env:
          OE_API_KEY: ${{ secrets.OE_API_KEY }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%S)
          START=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%S)

          # Fetch market value
          MV=$(curl -sf -H "Authorization: Bearer $OE_API_KEY" \
            "https://api.openelectricity.org.au/v4/data/network/NEM?metrics=market_value&interval=5m&date_start=${START}&primary_grouping=network_region")

          # Fetch power by fueltech
          PW=$(curl -sf -H "Authorization: Bearer $OE_API_KEY" \
            "https://api.openelectricity.org.au/v4/data/network/NEM?metrics=power&interval=5m&date_start=${START}&primary_grouping=network_region&secondary_grouping=fueltech")

          # Write combined JSON
          echo "{\"fetched_at\":\"${NOW}\",\"market_value\":${MV},\"power\":${PW}}" > data/live-prices.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live-prices.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update live NEM prices [auto]"
          git push
